<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Graph Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede9;
      --bg-info: #e6f1fb;
      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-tertiary: #999994;
      --text-info: #185FA5;
      --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.13);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --node-fill: #534AB7;
      --node-sel: #185FA5;
      --node-link: #0F6E56;
      --edge: rgba(80,80,180,0.2);
      --edge-arrow: rgba(80,80,180,0.35);
      --label: rgba(40,40,80,0.82);
      --canvas-bg: #f0efe9;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1e;
        --bg-secondary: #2a2a2a;
        --bg-tertiary: #141414;
        --bg-info: #0c2340;
        --text-primary: #e8e8e8;
        --text-secondary: #aaaaaa;
        --text-tertiary: #666666;
        --text-info: #85B7EB;
        --text-danger: #f09595;
        --border: rgba(255,255,255,0.12);
        --border-md: rgba(255,255,255,0.22);
        --node-fill: #3C3489;
        --node-sel: #378ADD;
        --node-link: #1D9E75;
        --edge: rgba(180,180,255,0.22);
        --edge-arrow: rgba(180,180,255,0.38);
        --label: rgba(200,200,220,0.85);
        --canvas-bg: #111111;
      }
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); }

    #app { display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg-secondary); flex-shrink: 0;
    }
    #toolbar .brand { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-right: 6px; letter-spacing: -0.02em; }

    .tb-btn {
      font-size: 12px; padding: 5px 13px;
      border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
      background: var(--bg-primary); color: var(--text-primary);
      cursor: pointer; transition: background 0.15s; font-family: inherit;
    }
    .tb-btn:hover { background: var(--bg-secondary); }
    .tb-btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
    .tb-btn.primary:hover { background: #0C447C; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #sidebar {
      width: 240px; flex-shrink: 0;
      border-right: 0.5px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
      background: var(--bg-primary);
    }

    #form-panel { padding: 12px; border-bottom: 0.5px solid var(--border); }
    #form-panel h3 {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px;
    }

    .field { margin-bottom: 10px; }
    .field label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
    .field input, .field textarea {
      width: 100%; font-size: 13px; padding: 6px 8px;
      border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
      background: var(--bg-secondary); color: var(--text-primary);
      font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color: #185FA5; }
    .field textarea { resize: none; height: 64px; }

    #links-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; min-height: 24px; }
    .link-tag {
      font-size: 11px; padding: 2px 8px;
      background: var(--bg-info); color: var(--text-info);
      border-radius: 99px; cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .link-tag:hover { opacity: 0.75; }

    #node-list { padding: 12px; flex: 1; }
    #node-list h3 { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }

    .node-item {
      font-size: 12px; padding: 6px 8px; border-radius: var(--radius-md);
      cursor: pointer; border: 0.5px solid transparent; margin-bottom: 4px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.1s;
    }
    .node-item:hover { background: var(--bg-secondary); }
    .node-item.selected { border-color: #185FA5; background: var(--bg-info); }
    .node-item .nid { font-weight: 600; color: var(--text-info); margin-right: 5px; flex-shrink: 0; }
    .node-item .ncontent { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .node-item .ndel { flex-shrink: 0; opacity: 0.35; font-size: 11px; margin-left: 4px; padding: 2px; }
    .node-item .ndel:hover { opacity: 1; color: var(--text-danger); }

    #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--canvas-bg); }
    canvas#graph { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #canvas-hint { position: absolute; bottom: 10px; right: 12px; font-size: 11px; color: var(--text-tertiary); pointer-events: none; }

    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--bg-primary); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border); padding: 20px; width: 380px; max-width: 92vw;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .modal textarea {
      width: 100%; height: 140px; font-size: 12px; font-family: 'Cascadia Code','Consolas',monospace;
      padding: 8px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
      background: var(--bg-secondary); color: var(--text-primary); resize: none; outline: none;
    }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    .empty-hint { font-size: 12px; color: var(--text-tertiary); padding: 4px 0; }
  </style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <span class="brand">Node Graph</span>
    <button class="tb-btn primary" id="btn-add">+ Add node</button>
    <div style="flex:1"></div>
    <button class="tb-btn" id="btn-save">Save JSON</button>
    <button class="tb-btn" id="btn-import">Import JSON</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="form-panel">
        <h3 id="form-title">New node</h3>
        <div class="field">
          <label>ID</label>
          <input id="f-id" type="text" readonly style="opacity:0.5;cursor:default" placeholder="Auto-generated">
        </div>
        <div class="field">
          <label>Content</label>
          <textarea id="f-content" placeholder="Enter content..."></textarea>
        </div>
        <div class="field">
          <label>Links to (click nodes in graph or list)</label>
          <div id="links-list"></div>
        </div>
        <button class="tb-btn primary" id="btn-save-node" style="width:100%;margin-top:4px">Save node</button>
      </div>
      <div id="node-list">
        <h3>Nodes</h3>
        <div id="nodes-ul"></div>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="graph"></canvas>
      <div id="canvas-hint">drag to rotate &nbsp;•&nbsp; scroll to zoom &nbsp;•&nbsp; click node to select</div>
    </div>
  </div>
</div>

<div class="modal-bg" id="import-modal">
  <div class="modal">
    <h3>Import JSON</h3>
    <textarea id="import-ta" placeholder='Paste a JSON array, e.g. [{"id":1,"content":"hello","links_to":[]}]'></textarea>
    <div class="modal-btns">
      <button class="tb-btn" id="btn-import-cancel">Cancel</button>
      <button class="tb-btn primary" id="btn-import-ok">Import</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="save-modal">
  <div class="modal">
    <h3>Saved JSON</h3>
    <textarea id="save-ta" readonly></textarea>
    <div class="modal-btns">
      <button class="tb-btn" id="btn-copy">Copy to clipboard</button>
      <button class="tb-btn primary" id="btn-save-close">Close</button>
    </div>
  </div>
</div>

<script>
(function () {
  let nodes = [];
  let nextId = 1;
  let editingId = null;
  let editLinks = [];
  let selectedId = null;

  const canvas = document.getElementById('graph');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  let positions = {};
  let cam = { rotX: 0.4, rotY: 0.6, zoom: 1, panX: 0, panY: 0 };
  let drag = { active: false, last: null, type: null, moved: false };

  function isDark() {
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function getSize() {
    const r = wrap.getBoundingClientRect();
    return { w: r.width, h: r.height };
  }

  function resizeCanvas() {
    const { w, h } = getSize();
    canvas.width = w;
    canvas.height = h;
  }

  function ensurePosition(id) {
    if (!positions[id]) {
      const angle = Math.random() * Math.PI * 2;
      const elev = (Math.random() - 0.5) * Math.PI;
      const r = 120 + Math.random() * 80;
      positions[id] = {
        x: Math.cos(elev) * Math.cos(angle) * r,
        y: Math.sin(elev) * r,
        z: Math.cos(elev) * Math.sin(angle) * r,
        vx: 0, vy: 0, vz: 0
      };
    }
  }

  function project(x, y, z) {
    const { w, h } = getSize();
    const cx = Math.cos(cam.rotX), sx = Math.sin(cam.rotX);
    const cy = Math.cos(cam.rotY), sy = Math.sin(cam.rotY);
    const ry = y * cx - z * sx, rz = y * sx + z * cx;
    const rx2 = x * cy + rz * sy, rz2 = -x * sy + rz * cy;
    const fov = 400 * cam.zoom;
    const pz = rz2 + 500;
    return {
      px: rx2 * fov / pz + w / 2 + cam.panX,
      py: ry * fov / pz + h / 2 + cam.panY,
      scale: fov / pz
    };
  }

  function applyForces() {
    if (nodes.length < 2) return;
    nodes.forEach(a => {
      nodes.forEach(b => {
        if (a.id === b.id) return;
        const pa = positions[a.id], pb = positions[b.id];
        if (!pa || !pb) return;
        const dx = pa.x - pb.x, dy = pa.y - pb.y, dz = pa.z - pb.z;
        const d2 = dx * dx + dy * dy + dz * dz + 0.001;
        const d = Math.sqrt(d2);
        const rep = 2000 / d2;
        pa.vx += dx / d * rep; pa.vy += dy / d * rep; pa.vz += dz / d * rep;
      });
      (a.links_to || []).forEach(bid => {
        const pa = positions[a.id], pb = positions[bid];
        if (!pa || !pb) return;
        const dx = pb.x - pa.x, dy = pb.y - pa.y, dz = pb.z - pa.z;
        const d = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.001;
        const att = 0.01 * (d - 120);
        pa.vx += dx / d * att; pa.vy += dy / d * att; pa.vz += dz / d * att;
        pb.vx -= dx / d * att; pb.vy -= dy / d * att; pb.vz -= dz / d * att;
      });
      const p = positions[a.id];
      p.vx *= 0.85; p.vy *= 0.85; p.vz *= 0.85;
      p.x += p.vx; p.y += p.vy; p.z += p.vz;
    });
  }

  function draw() {
    const { w, h } = getSize();
    if (canvas.width !== w || canvas.height !== h) resizeCanvas();
    ctx.clearRect(0, 0, w, h);
    const dark = isDark();

    applyForces();

    const projected = nodes.map(n => {
      const p = positions[n.id];
      if (!p) return null;
      const { px, py, scale } = project(p.x, p.y, p.z);
      return { id: n.id, px, py, scale, content: n.content };
    }).filter(Boolean);

    // Draw edges
    nodes.forEach(n => {
      (n.links_to || []).forEach(lid => {
        const a = projected.find(p => p.id === n.id);
        const b = projected.find(p => p.id === lid);
        if (!a || !b) return;
        ctx.beginPath();
        ctx.moveTo(a.px, a.py);
        ctx.lineTo(b.px, b.py);
        ctx.strokeStyle = dark ? 'rgba(180,180,255,0.25)' : 'rgba(80,80,180,0.2)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Arrow at midpoint
        const angle = Math.atan2(b.py - a.py, b.px - a.px);
        const ar = 7;
        const mx = (a.px + b.px) / 2, my = (a.py + b.py) / 2;
        ctx.beginPath();
        ctx.moveTo(mx + Math.cos(angle) * ar, my + Math.sin(angle) * ar);
        ctx.lineTo(mx + Math.cos(angle + 2.4) * ar * 0.6, my + Math.sin(angle + 2.4) * ar * 0.6);
        ctx.lineTo(mx + Math.cos(angle - 2.4) * ar * 0.6, my + Math.sin(angle - 2.4) * ar * 0.6);
        ctx.closePath();
        ctx.fillStyle = dark ? 'rgba(180,180,255,0.4)' : 'rgba(80,80,180,0.35)';
        ctx.fill();
      });
    });

    // Draw nodes (back to front)
    projected.sort((a, b) => a.scale - b.scale).forEach(p => {
      const r = Math.max(14, 18 * p.scale);
      const isSel = p.id === selectedId;
      const isEdit = p.id === editingId;
      const isLinked = editLinks.includes(p.id);

      let fill;
      if (isSel) fill = dark ? '#378ADD' : '#185FA5';
      else if (isEdit) fill = dark ? '#534AB7' : '#3C3489';
      else if (isLinked) fill = dark ? '#1D9E75' : '#0F6E56';
      else fill = dark ? '#3C3489' : '#534AB7';

      ctx.beginPath();
      ctx.arc(p.px, p.py, r, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();

      if (isSel || isEdit) {
        ctx.strokeStyle = dark ? '#85B7EB' : '#378ADD';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // ID label inside
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.max(9, Math.round(11 * p.scale))}px 'Segoe UI',system-ui,sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Content label below
      const labelY = p.py;
      ctx.fillStyle = dark ? 'rgba(200,200,220,0.85)' : 'rgba(40,40,80,0.82)';
      ctx.font = `${Math.max(9, Math.round(10 * p.scale))}px 'Segoe UI',system-ui,sans-serif`;
      ctx.fillText(p.content, p.px, labelY);
    });

    requestAnimationFrame(draw);
  }

  function hitTest(ex, ey) {
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      const p = positions[n.id];
      if (!p) continue;
      const { px, py, scale } = project(p.x, p.y, p.z);
      const r = Math.max(14, 18 * scale);
      if ((ex - px) ** 2 + (ey - py) ** 2 <= r * r) return n.id;
    }
    return null;
  }

  const DRAG_THRESHOLD = 4;

  // Mouse interactions
  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const ex = e.clientX - rect.left, ey = e.clientY - rect.top;
    const hit = hitTest(ex, ey);
    if (hit != null) {
      if (editingId != null && hit !== editingId) {
        editLinks = editLinks.includes(hit)
          ? editLinks.filter(x => x !== hit)
          : [...editLinks, hit];
        renderLinks();
        return;
      }
      selectedId = hit;
      drag = { active: true, last: { x: e.clientX, y: e.clientY }, type: 'pan', moved: false };
      startEdit(hit);
    } else {
      drag = { active: true, last: { x: e.clientX, y: e.clientY }, type: 'cam', moved: false };
    }
  });

  canvas.addEventListener('mousemove', e => {
    if (!drag.active) return;
    const dx = e.clientX - drag.last.x, dy = e.clientY - drag.last.y;
    if (!drag.moved) {
      if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      drag.moved = true;
    }
    if (drag.type === 'cam') { cam.rotY += dx * 0.006; cam.rotX += dy * 0.006; }
    else { cam.panX += dx; cam.panY += dy; }
    drag.last = { x: e.clientX, y: e.clientY };
  });

  canvas.addEventListener('mouseup', () => drag.active = false);
  canvas.addEventListener('mouseleave', () => drag.active = false);

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    cam.zoom *= e.deltaY > 0 ? 0.93 : 1.07;
    cam.zoom = Math.max(0.15, Math.min(4, cam.zoom));
  }, { passive: false });

  // Touch support
  let lastTouchDist = null;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const ex = t.clientX - rect.left, ey = t.clientY - rect.top;
      const hit = hitTest(ex, ey);
      if (hit != null) {
        if (editingId != null && hit !== editingId) {
          editLinks = editLinks.includes(hit) ? editLinks.filter(x => x !== hit) : [...editLinks, hit];
          renderLinks(); return;
        }
        selectedId = hit; startEdit(hit);
      }
      drag = { active: true, last: { x: t.clientX, y: t.clientY }, type: hit != null ? 'pan' : 'cam' };
    }
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && drag.active) {
      const t = e.touches[0];
      const dx = t.clientX - drag.last.x, dy = t.clientY - drag.last.y;
      if (drag.type === 'cam') { cam.rotY += dx * 0.006; cam.rotX += dy * 0.006; }
      else { cam.panX += dx; cam.panY += dy; }
      drag.last = { x: t.clientX, y: t.clientY };
    }
    if (e.touches.length === 2 && lastTouchDist) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      cam.zoom *= dist / lastTouchDist;
      cam.zoom = Math.max(0.15, Math.min(4, cam.zoom));
      lastTouchDist = dist;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => { drag.active = false; lastTouchDist = null; });

  // Form helpers
  function renderLinks() {
    const el = document.getElementById('links-list');
    el.innerHTML = '';
    if (editLinks.length === 0) {
      el.innerHTML = '<span style="font-size:11px;color:var(--text-tertiary)">Click nodes in the graph to link</span>';
      return;
    }
    editLinks.forEach(lid => {
      const tag = document.createElement('span');
      tag.className = 'link-tag';
      tag.innerHTML = `#${lid} <span style="font-size:10px;margin-left:2px">✕</span>`;
      tag.onclick = () => { editLinks = editLinks.filter(x => x !== lid); renderLinks(); };
      el.appendChild(tag);
    });
  }

  function startEdit(id) {
    const n = nodes.find(x => x.id === id);
    if (!n) return;
    editingId = id;
    editLinks = [...n.links_to];
    document.getElementById('f-id').value = n.id;
    document.getElementById('f-content').value = n.content;
    document.getElementById('form-title').textContent = 'Edit node #' + id;
    renderLinks();
    renderNodeList();
  }

  function clearForm() {
    editingId = null; editLinks = []; selectedId = null;
    document.getElementById('f-id').value = '';
    document.getElementById('f-content').value = '';
    document.getElementById('form-title').textContent = 'New node';
    renderLinks();
    renderNodeList();
  }

  function renderNodeList() {
    const ul = document.getElementById('nodes-ul');
    ul.innerHTML = '';
    if (nodes.length === 0) {
      ul.innerHTML = '<div class="empty-hint">No nodes yet. Click "+ Add node" to start.</div>';
      return;
    }
    nodes.forEach(n => {
      const div = document.createElement('div');
      div.className = 'node-item' + (n.id === editingId ? ' selected' : '');
      div.innerHTML = `<span class="nid">#${n.id}</span><span class="ncontent">${n.content}</span><span class="ndel" title="Delete node">✕</span>`;
      div.onclick = e => {
        if (e.target.classList.contains('ndel')) {
          nodes = nodes.filter(x => x.id !== n.id);
          nodes.forEach(x => { x.links_to = x.links_to.filter(l => l !== n.id); });
          delete positions[n.id];
          if (editingId === n.id) clearForm();
          else renderNodeList();
          return;
        }
        selectedId = n.id;
        startEdit(n.id);
      };
      ul.appendChild(div);
    });
  }

  // Toolbar actions
  document.getElementById('btn-add').onclick = () => { clearForm(); document.getElementById('f-content').focus(); };

  document.getElementById('btn-save-node').onclick = () => {
    const content = document.getElementById('f-content').value.trim();
    if (!content) { document.getElementById('f-content').focus(); return; }
    if (editingId != null) {
      const n = nodes.find(x => x.id === editingId);
      if (n) { n.content = content; n.links_to = [...editLinks]; }
    } else {
      const id = nextId++;
      nodes.push({ id, content, links_to: [...editLinks] });
      ensurePosition(id);
      selectedId = id;
    }
    renderNodeList();
    clearForm();
  };

  document.getElementById('btn-save').onclick = () => {
    document.getElementById('save-ta').value = JSON.stringify(nodes, null, 2);
    document.getElementById('save-modal').classList.add('open');
  };
  document.getElementById('btn-save-close').onclick = () => document.getElementById('save-modal').classList.remove('open');
  document.getElementById('btn-copy').onclick = () => {
    const ta = document.getElementById('save-ta');
    navigator.clipboard.writeText(ta.value).catch(() => { ta.select(); document.execCommand('copy'); });
  };

  document.getElementById('btn-import').onclick = () => {
    document.getElementById('import-ta').value = '';
    document.getElementById('import-modal').classList.add('open');
    setTimeout(() => document.getElementById('import-ta').focus(), 50);
  };
  document.getElementById('btn-import-cancel').onclick = () => document.getElementById('import-modal').classList.remove('open');
  document.getElementById('btn-import-ok').onclick = () => {
    try {
      const arr = JSON.parse(document.getElementById('import-ta').value);
      if (!Array.isArray(arr)) throw new Error('Expected a JSON array');
      nodes = arr.map(n => ({
        id: Number(n.id),
        content: String(n.content || ''),
        links_to: (n.links_to || []).map(Number)
      }));
      positions = {};
      nextId = nodes.length > 0 ? Math.max(...nodes.map(n => n.id)) + 1 : 1;
      nodes.forEach(n => ensurePosition(n.id));
      clearForm();
      renderNodeList();
      document.getElementById('import-modal').classList.remove('open');
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  };

  // Close modals on backdrop click
  document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
  });

  // Init
  renderNodeList();
  renderLinks();
  resizeCanvas();
  draw();
  window.addEventListener('resize', resizeCanvas);
})();
</script>
</body>
</html>
